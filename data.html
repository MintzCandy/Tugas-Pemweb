<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pendaftaran</title>
</head>
<body style="background-color: #2C3E50;">
<form action="pemweb.html" method="get">
    <fieldset style="color: black; padding: 40px; width: 500px; margin: 50px auto; background-color: white; border-radius: 10px;">
       <h2 style="text-align: center;">Data Pribadi</h2>

        <label for="nama"><b>Nama Lengkap:</b></label><br>
        <input type="text" style="width:100%; height:40px;" required placeholder="Masukkan nama"> <br> <br>

        <label for="email"><b>Email:</b></label><br>
        <input type="email" style="width:100%; height:40px;" required placeholder="email@example.com"><br><br>

        <label for="password"><b>Password:</b></label><br>
        <input type="password" style="width:100%; height:40px;" minlength="8" placeholder="Minimal 8 karakter"><br>

        <p><b>Jenis Kelamin:</b></p>
        <input type="radio" id="pria" name="gender" value="pria">
        <label for="pria">Pria</label>

        <input type="radio" id="wanita" name="gender" value="wanita">
        <label for="wanita">Wanita</label>
        <br><br>

        <label for="game"><b>Game Favorite:</b></label><br>
        <select id="game" name="Game">
        <option value="">-- Pilih Game --</option>
        <option value="Fish It">Fish It</option>
        <option value="Violence District">Violence District</option>
        <option value="The Forge">The Forge</option>
        <option value="BrookHaven">BrookHaven</option>
        <option value="Pocong: Rumah Sakit Terkutuk">Pocong: Rumah Sakit Terkutuk</option>
        <option value="Sambung Kata">Sambung Kata</option>
        <option value="Blox Fruits">Blox Fruits</option>
        <option value="Murder Mystery">Murder Mystery</option>
        <option value="Dueling Grounds">Dueling Grounds</option>
    </select>

   <br><br>

  <label for="alamat"><b>Alamat:</b></label><br>
  <textarea id="alamat" name="alamat" rows="4" cols="80"></textarea>

<br><br>
        <div style="text-align:center;">
    <a href="file:///C:/Users/ASUS/Downloads/Tugas%20Pemweb/pemweb.html">
        <button type="button">Submit</button>
    </a>
</div>
    </fieldset>


</form>
</body>
</html>
